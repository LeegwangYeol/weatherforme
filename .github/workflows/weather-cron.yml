# 10분마다 배포된 앱의 강수 감시 엔드포인트를 호출한다.
# (Vercel 무료 플랜 크론은 하루 1회 제한이라 GitHub Actions를 주력으로 사용)
#
# 필요한 저장소 시크릿 (Settings → Secrets and variables → Actions):
#   APP_URL     : 배포 주소 (예: https://weatherforme.vercel.app)
#   CRON_SECRET : .env 의 CRON_SECRET 과 동일한 값
name: weather-cron

on:
  schedule:
    # 명목상 5분 — GitHub 무료 스케줄러는 크게 지연/생략될 수 있어
    # 신뢰 가능한 주기는 QStash/cron-job.org 등 외부 스케줄러 병행 권장 (README)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  check-rain:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call rain-watch endpoint
        run: |
          curl -fsS -m 45 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/weather"
